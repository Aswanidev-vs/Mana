<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mana — Full Reference Client</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #f8fafc; --muted: #94a3b8; --accent: #3b82f6;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Layout ─────────────────────────────────────────── */
  #app { display: flex; height: 100vh; }
  #sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  #main { flex: 1; display: flex; flex-direction: column; }
  #video-panel { height: 0; overflow: hidden; transition: height 0.3s; background: #000; }
  #video-panel.open { height: 40vh; }
  #chat-panel { flex: 1; display: flex; flex-direction: column; }

  /* ── Sidebar ────────────────────────────────────────── */
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h2 { font-size: 18px; margin-bottom: 8px; }
  .sidebar-header .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--green); color: #000; margin-left: 8px; }
  .sidebar-section { padding: 12px 16px; }
  .sidebar-section h3 { font-size: 12px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; }
  .room-list { list-style: none; }
  .room-list li { padding: 8px 12px; border-radius: var(--radius); cursor: pointer; font-size: 14px; margin-bottom: 2px; transition: background 0.15s; }
  .room-list li:hover { background: var(--border); }
  .room-list li.active { background: var(--accent); color: white; }
  .room-list .count { float: right; font-size: 12px; color: var(--muted); }
  .user-list { list-style: none; }
  .user-list li { padding: 4px 0; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .user-list .dot { width: 8px; height: 8px; border-radius: 50%; }
  .user-list .dot.online { background: var(--green); }
  .user-list .dot.offline { background: var(--red); }

  /* ── Chat ───────────────────────────────────────────── */
  #messages { flex: 1; overflow-y: auto; padding: 16px; }
  .msg { margin-bottom: 12px; max-width: 70%; }
  .msg.self { margin-left: auto; }
  .msg .bubble { padding: 10px 14px; border-radius: var(--radius); background: var(--surface); display: inline-block; }
  .msg.self .bubble { background: var(--accent); }
  .msg .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .msg .meta .ack { color: var(--green); margin-left: 4px; }
  .system-msg { text-align: center; color: var(--muted); font-size: 12px; margin: 8px 0; }
  #typing-indicator { font-size: 12px; color: var(--muted); padding: 0 16px 4px; height: 20px; }
  #input-bar { display: flex; padding: 12px; gap: 8px; border-top: 1px solid var(--border); }
  #msg-input { flex: 1; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
  #msg-input:focus { border-color: var(--accent); }
  .btn { padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.15s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #2563eb; }
  .btn-danger { background: var(--red); color: white; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ── Video ──────────────────────────────────────────── */
  #video-grid { display: flex; gap: 8px; padding: 8px; height: 100%; overflow-x: auto; }
  #video-grid video { height: 100%; border-radius: var(--radius); background: var(--surface); }
  #video-grid .video-card { position: relative; flex-shrink: 0; }
  #video-grid .label { position: absolute; bottom: 4px; left: 4px; font-size: 11px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; }
  #video-controls { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 6px; }

  /* ── Login overlay ──────────────────────────────────── */
  #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
  #login-box { background: var(--surface); padding: 32px; border-radius: 12px; width: 340px; }
  #login-box h2 { margin-bottom: 20px; text-align: center; }
  #login-box input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
  #login-box .btn { width: 100%; padding: 10px; font-size: 15px; }
  #login-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 20px; }
</style>
</head>
<body>

<!-- ═══ Login ═══ -->
<div id="login-overlay">
  <div id="login-box">
    <h2>Mana Login</h2>
    <input id="login-user" placeholder="Username" value="alice">
    <input id="login-pass" type="password" placeholder="Password" value="password123">
    <button class="btn btn-primary" id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ═══ App Shell ═══ -->
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Mana <span class="badge" id="status-badge">connecting</span></h2>
      <div style="font-size:12px;color:var(--muted)" id="user-info"></div>
    </div>
    <div class="sidebar-section">
      <h3>Rooms</h3>
      <ul class="room-list" id="room-list"></ul>
      <div style="display:flex;gap:4px;margin-top:8px">
        <input id="new-room" placeholder="new room…" style="flex:1;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px">
        <button class="btn btn-primary btn-sm" id="create-room-btn">+</button>
      </div>
    </div>
    <div class="sidebar-section">
      <h3>Online Users <span id="user-count">(0)</span></h3>
      <ul class="user-list" id="user-list"></ul>
    </div>
    <div class="sidebar-section">
      <h3>E2EE</h3>
      <div style="font-size:12px;color:var(--muted)" id="e2ee-status">Not initialized</div>
    </div>
  </div>

  <div id="main">
    <!-- Video panel (hidden by default) -->
    <div id="video-panel">
      <div id="video-grid"></div>
    </div>

    <div id="chat-panel">
      <div id="messages"></div>
      <div id="typing-indicator"></div>
      <div id="input-bar">
        <input id="msg-input" placeholder="Type a message…" autocomplete="off">
        <button class="btn btn-primary" id="send-btn">Send</button>
        <button class="btn btn-secondary" id="call-btn">Call</button>
        <button class="btn btn-secondary" id="screen-btn">Screen</button>
        <button class="btn btn-danger btn-sm" id="leave-btn">Leave</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════
let ws, token, username, role, currentRoom = '';
let pc = null, localStream = null, isMuted = false, isCameraOff = false;
let typingTimeout = null;
const peerConnections = {}; // peerID -> RTCPeerConnection
const remoteStreams = {};   // peerID -> MediaStream

// ═══════════════════════════════════════════════════════════════════
// Login
// ═══════════════════════════════════════════════════════════════════
document.getElementById('login-btn').onclick = async () => {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: user, password: pass})
    });
    if (!res.ok) { document.getElementById('login-error').textContent = await res.text(); return; }
    const data = await res.json();
    token = data.token;
    username = data.username;
    role = data.role;
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-info').textContent = username + ' (' + role + ')';
    connectWebSocket();
    initE2EE();
  } catch (e) {
    document.getElementById('login-error').textContent = e.message;
  }
};

// ═══════════════════════════════════════════════════════════════════
// WebSocket Connection
// ═══════════════════════════════════════════════════════════════════
function connectWebSocket() {
  ws = new WebSocket(`ws://${location.host}/ws?token=${token}`);
  ws.onopen = () => {
    setBadge('online', 'connected');
    loadRooms();
  };
  ws.onclose = () => {
    setBadge('offline', 'disconnected');
    setTimeout(connectWebSocket, 3000); // auto-reconnect
  };
  ws.onerror = () => setBadge('offline', 'error');
  ws.onmessage = (e) => handleServerMessage(JSON.parse(e.data));
}

function setBadge(color, text) {
  const b = document.getElementById('status-badge');
  b.textContent = text;
  b.style.background = color === 'online' ? 'var(--green)' : color === 'offline' ? 'var(--red)' : 'var(--yellow)';
}

// ═══════════════════════════════════════════════════════════════════
// Server Message Router
// ═══════════════════════════════════════════════════════════════════
function handleServerMessage(msg) {
  switch (msg.type) {
    case 'message':      onChatMessage(msg); break;
    case 'ack':          onAck(msg); break;
    case 'presence':     onPresence(msg); break;
    case 'typing':       onTyping(msg); break;
    case 'offer':        onOffer(msg); break;
    case 'answer':       onAnswer(msg); break;
    case 'candidate':    onCandidate(msg); break;
    case 'track_added':  onTrackAdded(msg); break;
    case 'mute':         onRemoteMute(msg); break;
    case 'camera_toggle':onRemoteCamera(msg); break;
    case 'key_exchange': onKeyExchange(msg); break;
    case 'error':        console.error('Server error:', msg.error); break;
    default:             console.log('Unknown msg:', msg);
  }
}

// ═══════════════════════════════════════════════════════════════════
// Room Management
// ═══════════════════════════════════════════════════════════════════
async function loadRooms() {
  const res = await fetch('/api/rooms');
  const rooms = await res.json();
  renderRooms(rooms);
}

function renderRooms(rooms) {
  const list = document.getElementById('room-list');
  list.innerHTML = '';
  (rooms || []).forEach(r => {
    const li = document.createElement('li');
    li.textContent = r.name || r.id;
    li.className = r.id === currentRoom ? 'active' : '';
    li.innerHTML += `<span class="count">${(r.members||[]).length}</span>`;
    li.onclick = () => joinRoom(r.id);
    list.appendChild(li);
  });
}

function joinRoom(roomID) {
  if (currentRoom) leaveRoom();
  currentRoom = roomID;
  ws.send(JSON.stringify({type: 'join', room_id: roomID, from: username}));
  document.getElementById('messages').innerHTML = '';
  addSystemMessage(`Joined room "${roomID}"`);
  loadRooms();
}

function leaveRoom() {
  if (!currentRoom) return;
  ws.send(JSON.stringify({type: 'leave', room_id: currentRoom, from: username}));
  addSystemMessage(`Left room "${currentRoom}"`);
  currentRoom = '';
  stopCall();
  loadRooms();
}

// ═══════════════════════════════════════════════════════════════════
// Chat Messaging
// ═══════════════════════════════════════════════════════════════════
document.getElementById('send-btn').onclick = sendMessage;
document.getElementById('msg-input').onkeydown = (e) => {
  if (e.key === 'Enter') { sendMessage(); return; }
  sendTyping();
};

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentRoom) return;

  const ackId = crypto.randomUUID();
  const payload = new TextEncoder().encode(text);

  ws.send(JSON.stringify({
    type: 'message',
    from: username,
    room_id: currentRoom,
    payload: Array.from(payload),
    ack_id: ackId
  }));

  addChatBubble(text, username, ackId, true);
  input.value = '';
}

function onChatMessage(msg) {
  const text = new TextDecoder().decode(new Uint8Array(msg.payload));
  addChatBubble(text, msg.from || msg.sender_id, '', false);
}

function addChatBubble(text, from, ackId, self) {
  const div = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg' + (self ? ' self' : '');
  el.innerHTML = `
    <div class="bubble"><b>${esc(from)}</b><br>${esc(text)}</div>
    <div class="meta">
      ${new Date().toLocaleTimeString()}
      ${ackId ? `<span class="ack" id="ack-${ackId}">○</span>` : ''}
    </div>`;
  div.appendChild(el);
  div.scrollTop = div.scrollHeight;
}

function onAck(msg) {
  const el = document.getElementById('ack-' + msg.ack_id);
  if (el) el.textContent = '✓';
}

function addSystemMessage(text) {
  const div = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  div.appendChild(el);
  div.scrollTop = div.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════════
// Typing Indicators
// ═══════════════════════════════════════════════════════════════════
function sendTyping() {
  if (typingTimeout) return;
  ws.send(JSON.stringify({type: 'typing', room_id: currentRoom, from: username}));
  typingTimeout = setTimeout(() => { typingTimeout = null; }, 2000);
}

function onTyping(msg) {
  const el = document.getElementById('typing-indicator');
  el.textContent = `${msg.from} is typing…`;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.textContent = ''; }, 3000);
}

// ═══════════════════════════════════════════════════════════════════
// Presence (Online/Offline)
// ═══════════════════════════════════════════════════════════════════
function onPresence(msg) {
  addSystemMessage(`${msg.username} is now ${msg.online ? 'online' : 'offline'}`);
  // update user list
  const list = document.getElementById('user-list');
  const existing = document.getElementById('user-' + msg.user_id);
  if (existing) existing.remove();
  if (!msg.online) return;
  const li = document.createElement('li');
  li.id = 'user-' + msg.user_id;
  li.innerHTML = `<span class="dot online"></span> ${esc(msg.username)}`;
  list.appendChild(li);
  document.getElementById('user-count').textContent = '(' + list.children.length + ')';
}

// ═══════════════════════════════════════════════════════════════════
// WebRTC — Audio / Video / Screen Sharing (SFU Mode)
// ═══════════════════════════════════════════════════════════════════
document.getElementById('call-btn').onclick = toggleCall;
document.getElementById('screen-btn').onclick = toggleScreen;
document.getElementById('leave-btn').onclick = () => leaveRoom();

async function toggleCall() {
  if (pc) { stopCall(); return; }
  try {
    localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
  } catch (e) {
    console.error('getUserMedia:', e);
    addSystemMessage('Cannot access camera/microphone: ' + e.message);
    return;
  }
  startCall(localStream);
}

async function toggleScreen() {
  if (pc) { stopCall(); return; }
  try {
    localStream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
  } catch (e) {
    console.error('getDisplayMedia:', e);
    return;
  }
  startCall(localStream);
}

function startCall(stream) {
  document.getElementById('video-panel').classList.add('open');
  addLocalVideo(stream);
  document.getElementById('call-btn').textContent = 'End Call';
  document.getElementById('call-btn').classList.replace('btn-secondary', 'btn-danger');

  pc = new RTCPeerConnection({
    iceServers: [{urls: 'stun:stun.l.google.com:19302'}, {urls: 'stun:stun1.l.google.com:19302'}]
  });

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      ws.send(JSON.stringify({
        type: 'candidate',
        from: username,
        room_id: currentRoom,
        candidate: JSON.stringify(e.candidate)
      }));
    }
  };

  pc.ontrack = (e) => {
    addRemoteVideo('remote-' + Date.now(), e.streams[0]);
  };

  pc.onnegotiationneeded = async () => {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({
      type: 'offer',
      from: username,
      room_id: currentRoom,
      sdp: offer.sdp
    }));
  };
}

function stopCall() {
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('video-panel').classList.remove('open');
  document.getElementById('video-grid').innerHTML = '';
  document.getElementById('call-btn').textContent = 'Call';
  document.getElementById('call-btn').classList.replace('btn-danger', 'btn-secondary');
}

function addLocalVideo(stream) {
  const grid = document.getElementById('video-grid');
  const card = document.createElement('div');
  card.className = 'video-card';
  card.id = 'local-video-card';
  const vid = document.createElement('video');
  vid.autoplay = true; vid.muted = true; vid.playsInline = true;
  vid.srcObject = stream;
  card.innerHTML = `<div class="label">${esc(username)} (you)</div>
    <div id="video-controls">
      <button class="btn btn-sm btn-secondary" id="mute-btn" onclick="toggleMute()">Mute</button>
      <button class="btn btn-sm btn-secondary" id="cam-btn" onclick="toggleCamera()">Cam</button>
    </div>`;
  card.prepend(vid);
  grid.appendChild(card);
}

function addRemoteVideo(id, stream) {
  let card = document.getElementById('card-' + id);
  if (card) { card.querySelector('video').srcObject = stream; return; }
  const grid = document.getElementById('video-grid');
  card = document.createElement('div');
  card.className = 'video-card'; card.id = 'card-' + id;
  const vid = document.createElement('video');
  vid.autoplay = true; vid.playsInline = true;
  vid.srcObject = stream;
  card.innerHTML = `<div class="label">${esc(id)}</div>`;
  card.prepend(vid);
  grid.appendChild(card);
}

// ═══════════════════════════════════════════════════════════════════
// Mute / Camera Toggle
// ═══════════════════════════════════════════════════════════════════
function toggleMute() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  ws.send(JSON.stringify({type: 'mute', room_id: currentRoom, from: username, payload: isMuted}));
  document.getElementById('mute-btn').textContent = isMuted ? 'Unmute' : 'Mute';
}

function toggleCamera() {
  if (!localStream) return;
  isCameraOff = !isCameraOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isCameraOff);
  ws.send(JSON.stringify({type: 'camera_toggle', room_id: currentRoom, from: username, payload: isCameraOff}));
  document.getElementById('cam-btn').textContent = isCameraOff ? 'Cam On' : 'Cam';
}

function onRemoteMute(msg) {
  addSystemMessage(`${msg.from} ${msg.payload ? 'muted' : 'unmuted'}`);
}

function onRemoteCamera(msg) {
  addSystemMessage(`${msg.from} camera ${msg.payload ? 'off' : 'on'}`);
}

// ═══════════════════════════════════════════════════════════════════
// WebRTC Signaling Handlers
// ═══════════════════════════════════════════════════════════════════
async function onOffer(msg) {
  if (!pc) return; // not in a call, ignore
  try {
    await pc.setRemoteDescription(new RTCSessionDescription({type: 'offer', sdp: msg.sdp}));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({
      type: 'answer',
      from: username,
      to: msg.from,
      room_id: currentRoom,
      sdp: answer.sdp
    }));
  } catch (e) { console.error('onOffer:', e); }
}

async function onAnswer(msg) {
  if (!pc) return;
  try {
    await pc.setRemoteDescription(new RTCSessionDescription({type: 'answer', sdp: msg.sdp}));
  } catch (e) { console.error('onAnswer:', e); }
}

async function onCandidate(msg) {
  if (!pc) return;
  try {
    const c = typeof msg.candidate === 'string' ? JSON.parse(msg.candidate) : msg.candidate;
    await pc.addIceCandidate(new RTCIceCandidate(c));
  } catch (e) { console.error('onCandidate:', e); }
}

function onTrackAdded(msg) {
  // SFU notifies us a new track is available — in a full implementation
  // we would send a "subscribe" signal. For this demo the SFU auto-subscribes.
  addSystemMessage(`New track from ${msg.from}: ${msg.payload}`);
}

// ═══════════════════════════════════════════════════════════════════
// E2EE Key Exchange (X25519)
// ═══════════════════════════════════════════════════════════════════
async function initE2EE() {
  const el = document.getElementById('e2ee-status');
  try {
    // Generate X25519 key pair in the browser
    const kp = await crypto.subtle.generateKey({name: 'X25519', namedCurve: 'X25519'}, true, ['deriveBits']);
    const pubRaw = await crypto.subtle.exportKey('raw', kp.publicKey);
    el.textContent = 'Keys generated (X25519)';

    // Send public key to server for relay
    ws.send(JSON.stringify({
      type: 'key_exchange',
      from: username,
      payload: Array.from(new Uint8Array(pubRaw))
    }));
    el.textContent = 'E2EE ready — public key shared';
  } catch (e) {
    el.textContent = 'E2EE unavailable: ' + e.message;
  }
}

function onKeyExchange(msg) {
  const el = document.getElementById('e2ee-status');
  el.textContent = `Received public key from ${msg.from}`;
}

// ═══════════════════════════════════════════════════════════════════
// Room Creation
// ═══════════════════════════════════════════════════════════════════
document.getElementById('create-room-btn').onclick = () => {
  const input = document.getElementById('new-room');
  const name = input.value.trim();
  if (!name) return;
  joinRoom(name); // Mana auto-creates rooms on join
  input.value = '';
};

// ═══════════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════════
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
