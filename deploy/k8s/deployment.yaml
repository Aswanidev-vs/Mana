apiVersion: apps/v1
kind: Deployment
metadata:
  name: mana-example
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mana-example
  template:
    metadata:
      labels:
        app: mana-example
    spec:
      containers:
      - name: mana-example
        image: mana-example:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mana-example
spec:
  selector:
    app: mana-example
  ports:
  - port: 80
    targetPort: 8080
